<!DOCTYPE html>
<html>
	<head>
		<link href="https://googleapis.com" rel="stylesheet">
		<script src="load.js"></script>
		<style>
			body {
				background-color: rgb(31, 31, 31);
				font-family: "Roboto", sans-serif;
				color: white;
				margin-left: 20%;
				margin-right: 20%;
				font-size: 18px;
			}
			.class_block {
				background-color: rgb(65, 65, 65);
				padding: 20px;
				margin-top: 20px;
				border-radius: 20px;
			}
			h1 {
				color: greenyellow;
				text-align: center;
				font-size: 24px;
				margin: 0;
			}
			h2 {
				color: greenyellow;
				font-size: 18px;
				margin: 0;
			}
			ul {
				margin: 0;
				list-style-type: none;
			}
			td {
				padding-right: 20px;
				margin: 0;
				vertical-align: top;
			}
			.bottom_line {
				border-bottom: 1px solid rgb(141, 141, 141);
			}
			.class_name {
				color: greenyellow;
			}
			.field_name {
				color: cyan;
			}
			.field_type {
				color: rgb(255, 218, 50);
			}
			.separator {
				color: rgb(255, 98, 150);
				font-weight: bold;
			}
			.argument1 {
				color: rgb(255, 98, 216);
			}
			.argument2 {
				color: rgb(98, 255, 195);
			}
			a {
				text-decoration:  underline rgb(255, 218, 50) 2px;
			}
			table {
				max-width: 100%;
				margin: 0;
				border-collapse: collapse;
			}
		</style>
	</head>
	<body></body>
</html>
